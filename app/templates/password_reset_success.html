<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ subject }}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#F3F4F6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#374151;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#F3F4F6;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background-color:#FFFFFF;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(17,24,39,0.08);">
            <tr>
              <td style="background-color:#6C5CE7;padding:28px 24px;text-align:center;">
                <h1 style="margin:0;font-size:28px;line-height:1.2;font-weight:700;color:#FFFFFF;">
                  {{ header_title }}
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 28px 24px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.6;color:#374151;">
                  Hello {{ user_name }},
                </p>
                <p style="margin:0 0 16px;font-size:16px;line-height:1.6;color:#374151;">
                  {{ intro_text }}
                </p>
                <p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#374151;">
                  {{ body_text }}
                </p>
                <p style="margin:0 0 8px;font-size:15px;line-height:1.6;color:#374151;">
                  <strong>{{ login_label }}</strong>
                </p>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                  <tr>
                    <td align="center" style="background-color:#F3F4F6;border-radius:10px;padding:20px 16px;">
                      <a href="{{ frontend_login_url }}" style="display:inline-block;font-size:15px;line-height:1.4;font-weight:600;color:#6C5CE7;text-decoration:none;word-break:break-all;">
                        {{ frontend_login_url }}
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0 0 16px;font-size:15px;line-height:1.6;color:#6B7280;">
                  {{ security_note }}
                </p>
                <p style="margin:0;font-size:15px;line-height:1.6;color:#374151;white-space:pre-line;">
                  {{ sign_off }}
                </p>
              </td>
            </tr>
            <tr>
              <td style="background-color:#F9FAFB;border-top:1px solid #E5E7EB;padding:18px 24px;text-align:center;">
                <p style="margin:0;font-size:13px;line-height:1.5;color:#6B7280;">
                  &copy; {{ year }} NexGenChat. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
